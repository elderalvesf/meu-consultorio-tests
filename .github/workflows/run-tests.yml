name: E2E Tests

on:
  repository_dispatch:
    types: [new-build]
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL do APK (GitHub Release)'
        required: true
        type: string

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Appium UIAutomator2 driver
        run: npx appium driver install uiautomator2 || npx appium driver update uiautomator2 --unsafe

      - name: Resolve APK URL
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "APK_DOWNLOAD_URL=${{ github.event.client_payload.apk_url }}" >> $GITHUB_ENV
            echo "BUILD_NUMBER=${{ github.event.client_payload.build_number }}" >> $GITHUB_ENV
          else
            echo "APK_DOWNLOAD_URL=${{ github.event.inputs.apk_url }}" >> $GITHUB_ENV
            echo "BUILD_NUMBER=manual" >> $GITHUB_ENV
          fi

      - name: Download APK
        run: |
          mkdir -p apk
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$APK_DOWNLOAD_URL" \
            -o apk/app-release.apk

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests
        timeout-minutes: 30
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_4
          emulator-boot-timeout: 300
          disable-animations: true
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
            adb install -r apk/app-release.apk
            npx appium --port 4723 &
            sleep 8
            npm test
        env:
          DEVICE_NAME: emulator-5554
          ANDROID_VERSION: '14'
          APK_PATH: ./apk/app-release.apk
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-build-${{ env.BUILD_NUMBER }}
          path: reports/
          retention-days: 30
